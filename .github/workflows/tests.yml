name: Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test-server:
    name: Test Go Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install Dependencies
        run: |
          cd server
          go mod download

      - name: Run Go Tests
        run: |
          cd server
          go test -v ./...

      - name: Build Go Server
        run: |
          cd server
          go build -v -o xuruvoip-server

  test-client:
    name: Test .NET Client
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'
          architecture: x64

      - name: Run Client Tests
        run: dotnet test client/XuruVoipClient.Tests/XuruVoipClient.Tests.csproj -c Release
